name: Python Service Docker CI

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      registry:
        required: false
        type: string
        default: registry.lukas-roth.dev
      registry_username:
        required: false
        type: string
        default: registry
      python_version:
        required: false
        type: string
        default: "3.12"
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      context:
        required: false
        type: string
        default: .
      container_port:
        required: false
        type: string
        default: "5000"
      smoke_path:
        required: false
        type: string
        default: /api/auth/check
      docker_run_env:
        required: false
        type: string
        default: "-e SECRET_KEY=ci-secret -e SITE_URL=http://localhost"
      deploy:
        required: false
        type: boolean
        default: false
      deploy_path:
        required: false
        type: string
        default: /opt/firephenix
      deploy_services:
        required: false
        type: string
        default: ""
    secrets:
      REGISTRY_PASSWORD:
        required: false
      VPS_HOST:
        required: false
      VPS_USER:
        required: false
      VPS_SSH_KEY:
        required: false

jobs:
  check-build-push:
    runs-on: self-hosted

    env:
      LOCAL_IMAGE: local/${{ inputs.image_name }}:${{ github.sha }}
      REMOTE_IMAGE: ${{ inputs.registry }}/${{ inputs.image_name }}
      SHOULD_PUSH: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Compile Python sources
        run: python -m compileall .

      - name: Login to registry
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "$LOCAL_IMAGE" \
            -t "$REMOTE_IMAGE:${{ github.sha }}" \
            -t "$REMOTE_IMAGE:latest" \
            "${{ inputs.context }}"

      - name: Smoke test Docker image
        run: |
          set -euo pipefail

          container_id="$(docker run -d --rm -p 127.0.0.1::${{ inputs.container_port }} ${{ inputs.docker_run_env }} "$LOCAL_IMAGE")"
          trap 'docker stop "$container_id" >/dev/null 2>&1 || true' EXIT

          port="$(docker inspect --format '{{ (index (index .NetworkSettings.Ports "${{ inputs.container_port }}/tcp") 0).HostPort }}' "$container_id")"

          for attempt in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:${port}${{ inputs.smoke_path }}" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs "$container_id"
          exit 1

      - name: Push Docker image
        if: env.SHOULD_PUSH == 'true'
        run: |
          docker push "$REMOTE_IMAGE:${{ github.sha }}"
          docker push "$REMOTE_IMAGE:latest"

      - name: Deploy service
        if: inputs.deploy && inputs.deploy_services != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ inputs.deploy_path }}
            docker compose pull ${{ inputs.deploy_services }}
            docker compose up -d --no-deps ${{ inputs.deploy_services }}

      - name: Cleanup Docker images
        if: always()
        run: docker image prune -f
