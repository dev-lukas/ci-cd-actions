name: Python Service Docker CI

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      registry:
        required: false
        type: string
        default: registry.lukas-roth.dev
      registry_username:
        required: false
        type: string
        default: registry
      python_version:
        required: false
        type: string
        default: "3.12"
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      context:
        required: false
        type: string
        default: .
      container_port:
        required: false
        type: string
        default: "5000"
      smoke_path:
        required: false
        type: string
        default: /api/auth/check
      smoke_paths:
        required: false
        type: string
        default: ""
      docker_run_env:
        required: false
        type: string
        default: "-e SECRET_KEY=ci-secret -e SITE_URL=http://localhost"
      pre_build_command:
        required: false
        type: string
        default: ""
      test_command:
        required: false
        type: string
        default: ""
      container_test_command:
        required: false
        type: string
        default: ""
      deploy:
        required: false
        type: boolean
        default: false
      deploy_path:
        required: false
        type: string
        default: /opt/firephenix
      deploy_services:
        required: false
        type: string
        default: ""
    secrets:
      REGISTRY_PASSWORD:
        required: false
      VPS_HOST:
        required: false
      VPS_USER:
        required: false
      VPS_SSH_KEY:
        required: false

jobs:
  check-build-push:
    runs-on: self-hosted

    env:
      LOCAL_IMAGE: local/${{ inputs.image_name }}:${{ github.sha }}
      REMOTE_IMAGE: ${{ inputs.registry }}/${{ inputs.image_name }}
      SHOULD_PUSH: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Python sources
        run: python3 -m compileall .

      - name: Run pre-build checks
        if: inputs.pre_build_command != ''
        run: ${{ inputs.pre_build_command }}

      - name: Run host tests
        if: inputs.test_command != ''
        run: ${{ inputs.test_command }}

      - name: Login to registry
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "$LOCAL_IMAGE" \
            -t "$REMOTE_IMAGE:${{ github.sha }}" \
            -t "$REMOTE_IMAGE:latest" \
            "${{ inputs.context }}"

      - name: Compile Python sources inside image
        run: docker run --rm ${{ inputs.docker_run_env }} "$LOCAL_IMAGE" python3 -m compileall .

      - name: Run container tests
        if: inputs.container_test_command != ''
        env:
          CHECK_COMMAND: ${{ inputs.container_test_command }}
        run: docker run --rm ${{ inputs.docker_run_env }} "$LOCAL_IMAGE" sh -lc "$CHECK_COMMAND"

      - name: Smoke test Docker image
        env:
          SMOKE_PATHS: ${{ inputs.smoke_paths != '' && inputs.smoke_paths || inputs.smoke_path }}
        run: |
          set -euo pipefail

          container_id="$(docker run -d --rm -p 127.0.0.1::${{ inputs.container_port }} ${{ inputs.docker_run_env }} "$LOCAL_IMAGE")"
          trap 'docker stop "$container_id" >/dev/null 2>&1 || true' EXIT

          port="$(docker inspect --format '{{ (index (index .NetworkSettings.Ports "${{ inputs.container_port }}/tcp") 0).HostPort }}' "$container_id")"

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            ok=0

            for attempt in $(seq 1 45); do
              if curl -fsS "http://127.0.0.1:${port}${path}" >/dev/null; then
                ok=1
                break
              fi
              sleep 1
            done

            if [ "$ok" -ne 1 ]; then
              echo "Smoke test failed for ${path}" >&2
              docker logs "$container_id"
              exit 1
            fi
          done <<< "$SMOKE_PATHS"

      - name: Push Docker image
        if: env.SHOULD_PUSH == 'true'
        run: |
          docker push "$REMOTE_IMAGE:${{ github.sha }}"
          docker push "$REMOTE_IMAGE:latest"

      - name: Deploy service
        if: inputs.deploy && inputs.deploy_services != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ inputs.deploy_path }}
            docker compose pull ${{ inputs.deploy_services }}
            docker compose up -d --no-deps ${{ inputs.deploy_services }}

      - name: Cleanup Docker images
        if: always()
        run: docker image prune -f
