name: FirePhenix Ephemeral Stack CI

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      image_name:
        required: true
        type: string
      registry:
        required: false
        type: string
        default: registry.lukas-roth.dev
      registry_username:
        required: false
        type: string
        default: registry
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      context:
        required: false
        type: string
        default: .
      backend_image_name:
        required: false
        type: string
        default: firephenix-backend
      website_image_name:
        required: false
        type: string
        default: firephenix-website
      backend_smoke_paths:
        required: false
        type: string
        default: |
          /api/auth/check
          /api/ranking/stats
          /api/ranking/top
          /api/user/online?platform=discord
      website_smoke_paths:
        required: false
        type: string
        default: |
          /
          /ranking
          /wiki
          /profile
    secrets:
      REGISTRY_PASSWORD:
        required: true

jobs:
  ephemeral-stack:
    runs-on: self-hosted

    env:
      LOCAL_IMAGE: local/${{ inputs.image_name }}:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build image under test
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "$LOCAL_IMAGE" \
            "${{ inputs.context }}"

      - name: Prepare stack images
        run: |
          set -euo pipefail

          case "${{ inputs.component }}" in
            backend)
              echo "BACKEND_IMAGE=$LOCAL_IMAGE" >> "$GITHUB_ENV"
              echo "WEBSITE_IMAGE=${{ inputs.registry }}/${{ inputs.website_image_name }}:latest" >> "$GITHUB_ENV"
              docker pull "${{ inputs.registry }}/${{ inputs.website_image_name }}:latest"
              ;;
            website)
              echo "BACKEND_IMAGE=${{ inputs.registry }}/${{ inputs.backend_image_name }}:latest" >> "$GITHUB_ENV"
              echo "WEBSITE_IMAGE=$LOCAL_IMAGE" >> "$GITHUB_ENV"
              docker pull "${{ inputs.registry }}/${{ inputs.backend_image_name }}:latest"
              ;;
            *)
              echo "Unsupported component: ${{ inputs.component }}" >&2
              exit 1
              ;;
          esac

      - name: Write ephemeral Docker Compose file
        run: |
          cat > docker-compose.ci.yml <<'YAML'
          services:
            mariadb:
              image: mariadb:11
              environment:
                MARIADB_ROOT_PASSWORD: ci-root
                MARIADB_DATABASE: firephenix
                MARIADB_USER: firephenix
                MARIADB_PASSWORD: ci-password

            valkey:
              image: valkey/valkey:8-alpine

            backend:
              image: ${BACKEND_IMAGE}
              environment:
                SECRET_KEY: ci-secret
                SITE_URL: http://localhost
                DB_HOST: mariadb
                DB_PORT: "3306"
                DB_USER: firephenix
                DB_PASSWORD: ci-password
                VALKEY_HOST: valkey
                VALKEY_PORT: "6379"
                TS3_HOST: teamspeak-disabled
                TS3_PASSWORD: ci-disabled
              depends_on:
                - mariadb
                - valkey
              ports:
                - "127.0.0.1::5000"

            website:
              image: ${WEBSITE_IMAGE}
              depends_on:
                - backend
              ports:
                - "127.0.0.1::80"
          YAML

      - name: Start ephemeral stack
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Smoke test stack
        run: |
          set -euo pipefail

          backend_port="$(docker compose -f docker-compose.ci.yml port backend 5000 | awk -F: '{print $NF}')"
          website_port="$(docker compose -f docker-compose.ci.yml port website 80 | awk -F: '{print $NF}')"

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            ok=0

            for attempt in $(seq 1 60); do
              if curl -fsS "http://127.0.0.1:${backend_port}${path}" >/tmp/firephenix-backend-response.json; then
                if [ "$path" = "/api/auth/check" ]; then
                  if ! grep -Fq '"authenticated":false' /tmp/firephenix-backend-response.json; then
                    sleep 1
                    continue
                  fi
                fi
                ok=1
                break
              fi
              sleep 1
            done

            if [ "$ok" -ne 1 ]; then
              echo "Backend smoke test failed for ${path}" >&2
              exit 1
            fi
          done <<< "${{ inputs.backend_smoke_paths }}"

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            ok=0

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${website_port}${path}" >/tmp/firephenix-website-response.html; then
                if ! grep -Fq '<div id="app">' /tmp/firephenix-website-response.html; then
                  sleep 1
                  continue
                fi
                ok=1
                break
              fi
              sleep 1
            done

            if [ "$ok" -ne 1 ]; then
              echo "Website smoke test failed for ${path}" >&2
              exit 1
            fi
          done <<< "${{ inputs.website_smoke_paths }}"

      - name: Dump stack logs
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs --no-color

      - name: Cleanup ephemeral stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v --remove-orphans
