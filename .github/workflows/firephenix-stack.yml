name: FirePhenix Ephemeral Stack CI

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      image_name:
        required: true
        type: string
      registry:
        required: false
        type: string
        default: registry.lukas-roth.dev
      registry_username:
        required: false
        type: string
        default: registry
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      context:
        required: false
        type: string
        default: .
      backend_image_name:
        required: false
        type: string
        default: firephenix-backend
      website_image_name:
        required: false
        type: string
        default: firephenix-website
      backend_smoke_paths:
        required: false
        type: string
        default: |
          /api/auth/check
          /api/ranking/stats
          /api/ranking/top
          /api/user/online?platform=discord
      website_smoke_paths:
        required: false
        type: string
        default: |
          /
          /ranking
          /wiki
          /profile
      browser_smoke_image:
        required: false
        type: string
        default: mcr.microsoft.com/playwright:v1.49.1-noble
    secrets:
      REGISTRY_PASSWORD:
        required: true

jobs:
  ephemeral-stack:
    runs-on: self-hosted

    env:
      LOCAL_IMAGE: local/${{ inputs.image_name }}:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build image under test
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "$LOCAL_IMAGE" \
            "${{ inputs.context }}"

      - name: Prepare stack images
        run: |
          set -euo pipefail

          case "${{ inputs.component }}" in
            backend)
              echo "BACKEND_IMAGE=$LOCAL_IMAGE" >> "$GITHUB_ENV"
              echo "WEBSITE_IMAGE=${{ inputs.registry }}/${{ inputs.website_image_name }}:latest" >> "$GITHUB_ENV"
              docker pull "${{ inputs.registry }}/${{ inputs.website_image_name }}:latest"
              ;;
            website)
              echo "BACKEND_IMAGE=${{ inputs.registry }}/${{ inputs.backend_image_name }}:latest" >> "$GITHUB_ENV"
              echo "WEBSITE_IMAGE=$LOCAL_IMAGE" >> "$GITHUB_ENV"
              docker pull "${{ inputs.registry }}/${{ inputs.backend_image_name }}:latest"
              ;;
            *)
              echo "Unsupported component: ${{ inputs.component }}" >&2
              exit 1
              ;;
          esac

      - name: Write ephemeral Docker Compose file
        run: |
          cat > nginx.ci.conf <<'NGINX'
          events {}

          http {
            server {
              listen 80;
              server_name _;

              location /api/ {
                proxy_pass http://backend:5000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }

              location / {
                proxy_pass http://website:80;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
            }
          }
          NGINX

          cat > docker-compose.ci.yml <<'YAML'
          services:
            mariadb:
              image: mariadb:11
              environment:
                MARIADB_ROOT_PASSWORD: ci-root
                MARIADB_DATABASE: firephenix
                MARIADB_USER: firephenix
                MARIADB_PASSWORD: ci-password

            valkey:
              image: valkey/valkey:8-alpine

            backend:
              image: ${BACKEND_IMAGE}
              environment:
                SECRET_KEY: ci-secret
                SITE_URL: http://localhost
                DB_HOST: mariadb
                DB_PORT: "3306"
                DB_USER: firephenix
                DB_PASSWORD: ci-password
                VALKEY_HOST: valkey
                VALKEY_PORT: "6379"
                LIMITER_STORAGE_URI: valkey://valkey:6379
                CORS_ORIGINS: http://localhost
                TS3_HOST: teamspeak-disabled
                TS3_PASSWORD: ci-disabled
              depends_on:
                - mariadb
                - valkey
              ports:
                - "127.0.0.1::5000"

            website:
              image: ${WEBSITE_IMAGE}
              depends_on:
                - backend
              ports:
                - "127.0.0.1::80"

            edge:
              image: nginx:alpine
              depends_on:
                - backend
                - website
              volumes:
                - ./nginx.ci.conf:/etc/nginx/nginx.conf:ro
              ports:
                - "127.0.0.1::80"
          YAML

      - name: Start ephemeral stack
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Smoke test stack
        run: |
          set -euo pipefail

          backend_port="$(docker compose -f docker-compose.ci.yml port backend 5000 | awk -F: '{print $NF}')"
          edge_port="$(docker compose -f docker-compose.ci.yml port edge 80 | awk -F: '{print $NF}')"

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            ok=0

            for attempt in $(seq 1 60); do
              if curl -fsS "http://127.0.0.1:${backend_port}${path}" >/tmp/firephenix-backend-response.json 2>/tmp/firephenix-backend-smoke-error.log; then
                if [ "$path" = "/api/auth/check" ]; then
                  if ! grep -Fq '"authenticated":false' /tmp/firephenix-backend-response.json; then
                    sleep 1
                    continue
                  fi
                fi
                ok=1
                break
              fi
              sleep 1
            done

            if [ "$ok" -ne 1 ]; then
              echo "Backend smoke test failed for ${path}" >&2
              cat /tmp/firephenix-backend-smoke-error.log >&2 || true
              exit 1
            fi
          done <<< "${{ inputs.backend_smoke_paths }}"

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            ok=0

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${edge_port}${path}" >/tmp/firephenix-website-response.html 2>/tmp/firephenix-website-smoke-error.log; then
                if ! grep -Fq '<div id="app">' /tmp/firephenix-website-response.html; then
                  sleep 1
                  continue
                fi
                ok=1
                break
              fi
              sleep 1
            done

            if [ "$ok" -ne 1 ]; then
              echo "Website smoke test failed for ${path}" >&2
              cat /tmp/firephenix-website-smoke-error.log >&2 || true
              exit 1
            fi
          done <<< "${{ inputs.website_smoke_paths }}"

      - name: Browser smoke test website
        env:
          BROWSER_SMOKE_IMAGE: ${{ inputs.browser_smoke_image }}
          SMOKE_PATHS: ${{ inputs.website_smoke_paths }}
        run: |
          set -euo pipefail

          edge_port="$(docker compose -f docker-compose.ci.yml port edge 80 | awk -F: '{print $NF}')"

          cat > firephenix-browser-smoke.mjs <<'JS'
          const { chromium } = require('playwright');

          const baseUrl = process.env.BASE_URL;
          const paths = process.env.SMOKE_PATHS
            .split('\n')
            .map((path) => path.trim())
            .filter(Boolean);

          const browser = await chromium.launch();
          const page = await browser.newPage();
          const errors = [];

          page.on('console', (message) => {
            if (message.type() === 'error') {
              errors.push(`console.error: ${message.text()}`);
            }
          });
          page.on('pageerror', (error) => {
            errors.push(`pageerror: ${error.message}`);
          });
          page.on('requestfailed', (request) => {
            errors.push(`request failed: ${request.url()} ${request.failure()?.errorText ?? ''}`);
          });

          for (const path of paths) {
            const response = await page.goto(`${baseUrl}${path}`, {
              waitUntil: 'networkidle',
              timeout: 30000,
            });

            if (!response?.ok()) {
              errors.push(`navigation failed: ${path} ${response?.status() ?? 'no response'}`);
            }

            await page.locator('#app').waitFor({ timeout: 10000 });
          }

          await browser.close();

          if (errors.length > 0) {
            console.error(errors.join('\n'));
            process.exit(1);
          }
          JS

          docker run --rm \
            --network host \
            -e BASE_URL="http://127.0.0.1:${edge_port}" \
            -e SMOKE_PATHS="$SMOKE_PATHS" \
            -v "$PWD/firephenix-browser-smoke.mjs:/work/firephenix-browser-smoke.mjs:ro" \
            "$BROWSER_SMOKE_IMAGE" \
            node /work/firephenix-browser-smoke.mjs

      - name: Dump stack logs
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs --no-color

      - name: Cleanup ephemeral stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v --remove-orphans
