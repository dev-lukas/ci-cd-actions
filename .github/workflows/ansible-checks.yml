name: Ansible Checks

on:
  workflow_call:
    inputs:
      runs_on:
        required: false
        type: string
        default: self-hosted
      python_version:
        required: false
        type: string
        default: system
      requirements_file:
        required: false
        type: string
        default: requirements.txt
      galaxy_requirements_file:
        required: false
        type: string
        default: requirements.yml
      yaml_lint_command:
        required: false
        type: string
        default: yamllint .
      ansible_lint_command:
        required: false
        type: string
        default: ansible-lint
      syntax_check_command:
        required: false
        type: string
        default: |
          for playbook in playbooks/*.yml; do
            ansible-playbook --syntax-check "$playbook"
          done

jobs:
  ansible-checks:
    runs-on: ${{ inputs.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Python
        env:
          PYTHON_VERSION: ${{ inputs.python_version }}
        run: |
          set -euo pipefail

          python_bin=python3
          if [ -n "$PYTHON_VERSION" ] && [ "$PYTHON_VERSION" != "system" ]; then
            requested_bin="python${PYTHON_VERSION}"
            if command -v "$requested_bin" >/dev/null 2>&1; then
              python_bin="$requested_bin"
            else
              echo "::warning::${requested_bin} is not installed on this runner; using python3"
            fi
          fi

          "$python_bin" --version
          echo "PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"

      - name: Install Python requirements
        env:
          REQUIREMENTS_FILE: ${{ inputs.requirements_file }}
        run: |
          set -euo pipefail

          if [ -f "$REQUIREMENTS_FILE" ]; then
            "$PYTHON_BIN" -m pip install -r "$REQUIREMENTS_FILE"
          else
            "$PYTHON_BIN" -m pip install ansible
          fi

          "$PYTHON_BIN" -m pip install ansible-lint yamllint

      - name: Install Ansible Galaxy requirements
        env:
          GALAXY_REQUIREMENTS_FILE: ${{ inputs.galaxy_requirements_file }}
        run: |
          set -euo pipefail

          if [ -f "$GALAXY_REQUIREMENTS_FILE" ]; then
            ansible-galaxy install -r "$GALAXY_REQUIREMENTS_FILE"
          fi

      - name: Lint YAML
        if: inputs.yaml_lint_command != ''
        env:
          YAML_LINT_COMMAND: ${{ inputs.yaml_lint_command }}
        run: bash -euo pipefail -c "$YAML_LINT_COMMAND"

      - name: Lint Ansible
        if: inputs.ansible_lint_command != ''
        env:
          ANSIBLE_LINT_COMMAND: ${{ inputs.ansible_lint_command }}
        run: bash -euo pipefail -c "$ANSIBLE_LINT_COMMAND"

      - name: Syntax check playbooks
        if: inputs.syntax_check_command != ''
        env:
          SYNTAX_CHECK_COMMAND: ${{ inputs.syntax_check_command }}
        run: bash -euo pipefail -c "$SYNTAX_CHECK_COMMAND"
