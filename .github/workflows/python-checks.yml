name: Python Checks

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: system
      requirements_file:
        required: false
        type: string
        default: ""
      install_command:
        required: false
        type: string
        default: ""
      check_commands:
        required: false
        type: string
        default: ""

jobs:
  python-checks:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve Python
        env:
          PYTHON_VERSION: ${{ inputs.python_version }}
        run: |
          set -euo pipefail

          python_bin=python3
          if [ -n "$PYTHON_VERSION" ] && [ "$PYTHON_VERSION" != "system" ]; then
            requested_bin="python${PYTHON_VERSION}"
            if command -v "$requested_bin" >/dev/null 2>&1; then
              python_bin="$requested_bin"
            else
              echo "::warning::${requested_bin} is not installed on this runner; using python3"
            fi
          fi

          "$python_bin" --version
          echo "PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"

      - name: Install requirements
        if: inputs.install_command != '' || inputs.requirements_file != ''
        env:
          INSTALL_COMMAND: ${{ inputs.install_command }}
          REQUIREMENTS_FILE: ${{ inputs.requirements_file }}
        run: |
          set -euo pipefail

          if [ -n "$INSTALL_COMMAND" ]; then
            bash -euo pipefail -c "$INSTALL_COMMAND"
          elif [ -f "$REQUIREMENTS_FILE" ]; then
            "$PYTHON_BIN" -m pip install -r "$REQUIREMENTS_FILE"
          fi

      - name: Run checks
        if: inputs.check_commands != ''
        env:
          CHECK_COMMANDS: ${{ inputs.check_commands }}
        run: bash -euo pipefail -c "$CHECK_COMMANDS"
