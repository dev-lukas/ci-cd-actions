name: Node Static Docker CI

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      registry:
        required: false
        type: string
        default: registry.lukas-roth.dev
      registry_username:
        required: false
        type: string
        default: registry
      node_version:
        required: false
        type: string
        default: "22"
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      context:
        required: false
        type: string
        default: .
      build_command:
        required: false
        type: string
        default: npm run build
      typecheck_command:
        required: false
        type: string
        default: ""
      lint_command:
        required: false
        type: string
        default: ""
      test_command:
        required: false
        type: string
        default: ""
      extra_check_command:
        required: false
        type: string
        default: ""
      audit_level:
        required: false
        type: string
        default: critical
      smoke_path:
        required: false
        type: string
        default: /
      smoke_paths:
        required: false
        type: string
        default: ""
      smoke_required_text:
        required: false
        type: string
        default: ""
      deploy:
        required: false
        type: boolean
        default: false
      deploy_path:
        required: false
        type: string
        default: /opt/firephenix
      deploy_services:
        required: false
        type: string
        default: ""
    secrets:
      REGISTRY_PASSWORD:
        required: false
      VPS_HOST:
        required: false
      VPS_USER:
        required: false
      VPS_SSH_KEY:
        required: false

jobs:
  check-build-push:
    runs-on: self-hosted

    env:
      LOCAL_IMAGE: local/${{ inputs.image_name }}:${{ github.sha }}
      REMOTE_IMAGE: ${{ inputs.registry }}/${{ inputs.image_name }}
      SHOULD_PUSH: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck application
        if: inputs.typecheck_command != ''
        env:
          CHECK_COMMAND: ${{ inputs.typecheck_command }}
        run: bash -lc "$CHECK_COMMAND"

      - name: Lint application
        if: inputs.lint_command != ''
        env:
          CHECK_COMMAND: ${{ inputs.lint_command }}
        run: bash -lc "$CHECK_COMMAND"

      - name: Run tests
        if: inputs.test_command != ''
        env:
          CHECK_COMMAND: ${{ inputs.test_command }}
        run: bash -lc "$CHECK_COMMAND"

      - name: Run extra checks
        if: inputs.extra_check_command != ''
        env:
          CHECK_COMMAND: ${{ inputs.extra_check_command }}
        run: bash -lc "$CHECK_COMMAND"

      - name: Build application
        run: ${{ inputs.build_command }}

      - name: Audit dependencies
        run: npm audit --audit-level=${{ inputs.audit_level }}

      - name: Login to registry
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -f "${{ inputs.dockerfile }}" \
            -t "$LOCAL_IMAGE" \
            -t "$REMOTE_IMAGE:${{ github.sha }}" \
            -t "$REMOTE_IMAGE:latest" \
            "${{ inputs.context }}"

      - name: Smoke test Docker image
        env:
          SMOKE_PATHS: ${{ inputs.smoke_paths != '' && inputs.smoke_paths || inputs.smoke_path }}
          SMOKE_REQUIRED_TEXT: ${{ inputs.smoke_required_text }}
        run: |
          set -euo pipefail

          container_id="$(docker run -d --rm -p 127.0.0.1::80 "$LOCAL_IMAGE")"
          trap 'docker stop "$container_id" >/dev/null 2>&1 || true' EXIT

          port="$(docker inspect --format '{{ (index (index .NetworkSettings.Ports "80/tcp") 0).HostPort }}' "$container_id")"

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            response_file="$(mktemp)"
            ok=0

            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${port}${path}" -o "$response_file"; then
                if [ -z "$SMOKE_REQUIRED_TEXT" ] || grep -Fq "$SMOKE_REQUIRED_TEXT" "$response_file"; then
                  ok=1
                  break
                fi
              fi
              sleep 1
            done

            if [ "$ok" -ne 1 ]; then
              echo "Smoke test failed for ${path}" >&2
              docker logs "$container_id"
              exit 1
            fi
          done <<< "$SMOKE_PATHS"

      - name: Push Docker image
        if: env.SHOULD_PUSH == 'true'
        run: |
          docker push "$REMOTE_IMAGE:${{ github.sha }}"
          docker push "$REMOTE_IMAGE:latest"

      - name: Deploy service
        if: inputs.deploy && inputs.deploy_services != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ inputs.deploy_path }}
            docker compose pull ${{ inputs.deploy_services }}
            docker compose up -d --no-deps ${{ inputs.deploy_services }}

      - name: Cleanup Docker images
        if: always()
        run: docker image prune -f
