name: Ansible CI

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.13"
      requirements_file:
        required: false
        type: string
        default: requirements.txt
      galaxy_requirements_file:
        required: false
        type: string
        default: requirements.yml
      inventory:
        required: false
        type: string
        default: inventory/hosts.yml
      playbook_glob:
        required: false
        type: string
        default: playbooks/*.yml

jobs:
  ansible:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install Python requirements
        run: |
          if [ -f "${{ inputs.requirements_file }}" ]; then
            pip install -r "${{ inputs.requirements_file }}"
          else
            pip install ansible ansible-lint yamllint
          fi

      - name: Install Ansible Galaxy requirements
        run: |
          if [ -f "${{ inputs.galaxy_requirements_file }}" ]; then
            ansible-galaxy install -r "${{ inputs.galaxy_requirements_file }}"
          fi

      - name: Lint YAML
        run: yamllint .

      - name: Lint Ansible
        run: ansible-lint

      - name: Syntax check playbooks
        run: |
          for playbook in ${{ inputs.playbook_glob }}; do
            ansible-playbook -i "${{ inputs.inventory }}" --syntax-check "$playbook"
          done
